<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M-KRA Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-container">
    <h2>M-KRA Login</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
        <input type="text" name="kra_pin" placeholder="KRA PIN" required>
        <input type="password" name="kra_password" placeholder="KRA Password" required>
        <button type="submit">Unlock</button>
    </form>
</div>
</body>
</html>
